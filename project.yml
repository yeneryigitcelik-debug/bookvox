name: BookVox
options:
  bundleIdPrefix: com.bookvox
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  BookVox:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BookVox
        excludes:
          - "**/.DS_Store"
    entitlements:
      path: BookVox/Resources/BookVox.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bookvox.app
        PRODUCT_NAME: BookVox
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        INFOPLIST_KEY_NSSupportsLiveActivities: false
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: true
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: supabase-swift
        product: Supabase
      - sdk: CoreSpotlight.framework
      - sdk: UserNotifications.framework
      - sdk: StoreKit.framework
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
      - sdk: AppIntents.framework
